<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Homework 2 — LLM Chat</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <main class="auth">
      <section class="card auth-card">
        <div class="auth-head">
          <div class="brand">LLM Chat</div>
          <button id="githubBtn" class="btn">GitHub OAuth</button>
        </div>

        <div class="tabs">
          <button id="modeLogin" class="tab active" type="button">Login</button>
          <button id="modeRegister" class="tab" type="button">Register</button>
        </div>

        <div id="panelLogin" class="panel">
          <input id="logLogin" class="input" placeholder="login" />
          <input id="logPass" class="input" placeholder="password" type="password" />
          <button id="logBtn" class="btn btn-primary" type="button">Login</button>
        </div>

        <div id="panelRegister" class="panel hidden" hidden>
          <input id="regLogin" class="input" placeholder="login" />
          <input id="regPass" class="input" placeholder="password" type="password" />
          <button id="regBtn" class="btn btn-primary" type="button">Register</button>
        </div>

        <div class="hint"></div>
      </section>
    </main>

    <script>
      const store = {
        get access() { return localStorage.getItem('access_token') || ''; },
        set access(v) { localStorage.setItem('access_token', v); },
        get refresh() { return localStorage.getItem('refresh_token') || ''; },
        set refresh(v) { localStorage.setItem('refresh_token', v); },
        clear() { localStorage.removeItem('access_token'); localStorage.removeItem('refresh_token'); }
      };

      async function api(path, options) {
        const headers = { 'Content-Type': 'application/json' };
        if (store.access) headers['Authorization'] = `Bearer ${store.access}`;
        const resp = await fetch(path, { headers, ...options });
        if (resp.status === 401 && store.refresh) {
          const rr = await fetch('/api/auth/refresh', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ refresh_token: store.refresh }) });
          if (rr.ok) {
            const data = await rr.json();
            store.access = data.access_token;
            return api(path, options);
          }
        }
        if (!resp.ok) {
          const t = await resp.text();
          throw new Error(t || `HTTP ${resp.status}`);
        }
        return resp.json();
      }

      function setMode(name) {
        const modeLogin = document.getElementById('modeLogin');
        const modeRegister = document.getElementById('modeRegister');
        const panelLogin = document.getElementById('panelLogin');
        const panelRegister = document.getElementById('panelRegister');
        const isLogin = name === 'login';
        modeLogin.classList.toggle('active', isLogin);
        modeRegister.classList.toggle('active', !isLogin);
        panelLogin.hidden = !isLogin;
        panelRegister.hidden = isLogin;
        panelLogin.style.display = isLogin ? 'flex' : 'none';
        panelRegister.style.display = isLogin ? 'none' : 'flex';
      }

      function errText(e) {
        const raw = e?.message || String(e);
        try {
          const j = JSON.parse(raw);
          if (typeof j?.detail === 'string') {
            if (j.detail === 'oauth_not_configured') return 'GitHub OAuth 未配置：请设置 GITHUB_CLIENT_ID 和 GITHUB_CLIENT_SECRET。';
            if (j.detail === 'jwt_secret_missing') return '服务端缺少 JWT_SECRET：请先设置 JWT_SECRET 并重启后端。';
            if (j.detail === 'oauth_init_failed') return 'GitHub OAuth 初始化失败：请检查 Redis 是否可用，以及 BASE_URL 是否正确。';
            if (j.detail === 'oauth_callback_failed') return 'GitHub OAuth 回调失败：请检查 GitHub App 配置与网络连接。';
            return j.detail;
          }
        } catch (_) {}
        return raw;
      }

      async function oauthStatusText() {
        try {
          const r = await fetch('/auth/github/status');
          if (!r.ok) return '';
          const s = await r.json();
          const parts = [];
          parts.push(`has_github_client_id=${!!s.has_github_client_id}`);
          parts.push(`has_github_client_secret=${!!s.has_github_client_secret}`);
          parts.push(`has_jwt_secret=${!!s.has_jwt_secret}`);
          parts.push(`request_base_url=${s.request_base_url || ''}`);
          return parts.join('\n');
        } catch (_) {
          return '';
        }
      }

      async function withBusy(btn, fn) {
        btn.disabled = true;
        try { return await fn(); } finally { btn.disabled = false; }
      }

      document.getElementById('regBtn').onclick = async () => {
        const btn = document.getElementById('regBtn');
        await withBusy(btn, async () => {
          const login = document.getElementById('regLogin').value.trim();
          const password = document.getElementById('regPass').value;
          await api('/api/auth/register', { method: 'POST', body: JSON.stringify({ login, password }) });
          const t = await api('/api/auth/login', { method: 'POST', body: JSON.stringify({ login, password }) });
          store.access = t.access_token;
          store.refresh = t.refresh_token;
          window.location.href = '/chat';
        }).catch((e) => alert(errText(e)));
      };

      document.getElementById('logBtn').onclick = async () => {
        const btn = document.getElementById('logBtn');
        await withBusy(btn, async () => {
          const login = document.getElementById('logLogin').value.trim();
          const password = document.getElementById('logPass').value;
          const t = await api('/api/auth/login', { method: 'POST', body: JSON.stringify({ login, password }) });
          store.access = t.access_token;
          store.refresh = t.refresh_token;
          window.location.href = '/chat';
        }).catch((e) => alert(errText(e)));
      };

      document.getElementById('githubBtn').onclick = async () => {
        const btn = document.getElementById('githubBtn');
        await withBusy(btn, async () => {
          const data = await api('/auth/github/login', { method: 'GET' });
          window.location.href = data.authorize_url;
        }).catch(async (e) => {
          const base = errText(e);
          const st = await oauthStatusText();
          alert(st ? `${base}\n\n${st}` : base);
        });
      };

      (async () => {
        document.getElementById('logPass').addEventListener('keydown', (e) => {
          if (e.key === 'Enter') document.getElementById('logBtn').click();
        });
        document.getElementById('regPass').addEventListener('keydown', (e) => {
          if (e.key === 'Enter') document.getElementById('regBtn').click();
        });
        document.getElementById('modeLogin').onclick = () => setMode('login');
        document.getElementById('modeRegister').onclick = () => setMode('register');
        if (store.access && store.refresh) {
          window.location.href = '/chat';
        }
        setMode('login');
      })();
    </script>
  </body>
</html>
